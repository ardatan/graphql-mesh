type Cache {
  redis: RedisConfig
}

union RedisConfig @md = RedisConfigSentinel | RedisConfigSingle | RedisConfigCluster

type RedisConfigCluster @md {
  startupNodes: [RedisSentinelConfig!]!
  username: String
  password: String
  db: Int
  """
  Flag to indicate lazyConnect value for Redis client.

  @default: true
  """
  lazyConnect: Boolean
  """
  Needed for TLS connections to Redis Cluster (especially when using AWS Elasticache Clusters with TLS).

  @see https://github.com/redis/ioredis?tab=readme-ov-file#special-note-aws-elasticache-clusters-with-tls
  """
  dnsLookupAsIs: Boolean
  """
  Enable TLS for Redis Cluster connections. Required for AWS Elasticache Clusters with TLS.

  @see https://github.com/redis/ioredis?tab=readme-ov-file#special-note-aws-elasticache-clusters-with-tls
  """
  tls: Boolean
  """
  IAM authentication configuration for AWS ElastiCache or MemoryDB cluster.
  The IAM token is signed using the first startup node's host and port.
  """
  iam: RedisCacheIAMConfig
}

type RedisConfigSentinel @md {
  """
  identifies a group of Redis instances composed of a master and one or more slaves
  """
  name: String!
  """
  (optional) password for Sentinel instances.
  """
  sentinelPassword: String
  """
  A list of sentinels to connect to. The list does not need to enumerate all your sentinel instances, but a few so that if one is down the client will try the next one.
  """
  sentinels: [RedisSentinelConfig!]!
  """
  (optional) with a value of slave will return a random slave from the Sentinel group.
  """
  role: RedisSentinelRole
  """
  (optional) set to true if connecting to sentinel instances that are encrypted
  """
  enableTLSForSentinelMode: Boolean
  """
  Flag to indicate lazyConnect value for Redis client.

  @default: true
  """
  lazyConnect: Boolean
}

enum RedisSentinelRole {
  master
  slave
}

type RedisSentinelConfig @md {
  host: String!
  port: String!
  family: String
}

type RedisConfigSingle @md {
  host: String
  port: String
  username: String
  password: String
  db: Int
  url: String
  family: String
  """
  Flag to indicate lazyConnect value for Redis client.

  @default: true
  """
  lazyConnect: Boolean
  """
  IAM authentication configuration for AWS ElastiCache or MemoryDB.
  """
  iam: RedisCacheIAMConfig
}

type RedisCacheIAMConfig @md {
  """
  AWS region for signing the IAM Redis authentication token.
  """
  region: String!
  """
  Redis ACL username to authenticate with.
  """
  username: String
  """
  AWS signing service name.

  @default: elasticache
  """
  serviceName: RedisIAMServiceName
  """
  Optional static AWS access key id. If omitted, default AWS credentials provider chain is used.
  """
  accessKeyId: String
  """
  Optional static AWS secret access key. If omitted, default AWS credentials provider chain is used.
  """
  secretAccessKey: String
  """
  Optional static AWS session token.
  """
  sessionToken: String
  """
  Optional IAM token expiration in seconds.

  @default: 900
  """
  tokenExpirationSeconds: Int
}

enum RedisIAMServiceName {
  elasticache
  memorydb
}
