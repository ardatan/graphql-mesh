extend type Handler {
  """
  Handler for Postgres database, based on `postgraphile`
  """
  postgraphile: PostGraphileHandler
}

type PostGraphileHandler @md {
  """
  A connection string to your Postgres database
  """
  connectionString: String
  """
  An array of strings which specifies the PostgreSQL schemas that PostGraphile will use to create a GraphQL schema. The default schema is the public schema.
  """
  schemaName: [String!]
  """
  Connection Pool instance or settings or you can provide the path of a code file that exports any of those
  """
  pool: Any
  """
  Extra PostGraphile v5 plugins to append (must be GraphileConfig.Plugin objects compatible with v5)
  """
  appendPlugins: [String]
  """
  PostGraphile v5 plugin names to disable (e.g. "NodePlugin")
  """
  skipPlugins: [String]
  """
  A PostGraphile v5 preset object or the path to a file exporting one (e.g. "./my-config#preset"). This is merged on top of the default PostGraphileAmberPreset. See the [PostGraphile v5 docs](https://postgraphile.org/postgraphile/next/preset-amber) for more information.
  """
  options: PostgraphileExternalOptions
  """
  A file that exports a function which takes mesh context as a parameter and returns extra context to merge into the GraphQL execution context (e.g. "./my-function#getContext"). The returned object may include `pgSettings` for per-request PostgreSQL settings. See the [PostGraphile v5 docs](https://postgraphile.org/postgraphile/next/config#graceful-context) for more information.
  """
  contextOptions: Any
}

union PostgraphileExternalOptions = JSON | String
